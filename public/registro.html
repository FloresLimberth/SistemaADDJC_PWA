<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Sistema ADDJC</title>
  <link rel="stylesheet" href="css/registro.css" />
</head>
<body>
  <div class="register-container">
    <h2>Registro de Usuario</h2>
    <form id="registerForm">
      <div class="form-group">
        <label for="nombre">Nombre completo *</label>
        <input type="text" id="nombre" name="nombre" required />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico *</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña *</label>
        <input type="password" id="password" name="password" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="rol">Tipo de usuario *</label>
        <select id="rol" name="rol" required>
          <option value="">-- Seleccione --</option>
          <option value="atleta">Atleta</option>
          <option value="entrenador">Entrenador</option>
          <option value="comite_tecnico">Comité Técnico</option>
        </select>
      </div>

      <!-- Campos condicionales -->
      <div id="municipioField" class="form-group extra-field" style="display: none;">
        <label for="municipio">Municipio *</label>
        <input type="text" id="municipio" name="municipio" />
      </div>

      <div id="clubField" class="form-group extra-field" style="display: none;">
        <label for="club">Club *</label>
        <input type="text" id="club" name="club" />
      </div>

      <div id="categoriaField" class="form-group extra-field" style="display: none;">
        <label for="categoria">Categoría (peso/edad)</label>
        <input type="text" id="categoria" name="categoria" placeholder="-73 kg, Junior, etc." />
      </div>

      <button type="submit" class="btn-register">Registrar</button>
    </form>
    <p class="back-link"><a href="/login.html">← Volver al login</a></p>
  </div>

  <script src="js/registro.js"></script>
</body>
</html>
