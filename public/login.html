<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - Sistema ADDJC</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-container">
    <!-- Logo y título -->
    <div class="login-header">
      <span class="logo-icon">🥋</span>
      <h2>Iniciar Sesión</h2>
      <p class="login-subtitle">Sistema de Planificación del Entrenamiento - ADDJC</p>
    </div>

    <!-- Contenedor de mensajes -->
    <div id="messageContainer"></div>

    <!-- Formulario -->
    <form id="loginForm">
      <!-- Email -->
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder=" "
          autocomplete="email"
          required 
        />
      </div>

      <!-- Contraseña con toggle -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="password-input"
            placeholder=" "
            autocomplete="current-password"
            required 
          />
          <button type="button" class="toggle-password" id="togglePassword">
            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Recordar y olvidé contraseña -->
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" name="remember" class="checkbox-input" />
          <span>Recordarme</span>
        </label>
        <a href="#" class="forgot-password" id="forgotPassword">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Botón de login -->
      <button type="submit" class="btn-login" id="btnLogin">
        Iniciar Sesión
      </button>

      <!-- Registro -->
      <p class="register-link">
        ¿Eres nuevo? <a href="/registro.html">Regístrate aquí</a>
      </p>
    </form>

    <!-- Volver al inicio -->
    <p class="back-link">
      <a href="/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Volver al inicio
      </a>
    </p>
  </div>

  <!-- Modal para recuperar contraseña -->
  <div id="forgotPasswordModal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-container">
      <div class="modal-header">
        <h3 class="modal-title">Recuperar Contraseña</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-text">Ingresa tu correo electrónico y te enviaremos instrucciones para restablecer tu contraseña.</p>
        <form id="forgotPasswordForm">
          <div class="form-group">
            <label for="recoveryEmail">Correo electrónico</label>
            <input 
              type="email" 
              id="recoveryEmail" 
              placeholder="correo@ejemplo.com"
              required 
            />
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelRecovery">Cancelar</button>
            <button type="submit" class="btn btn-primary">Enviar instrucciones</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
